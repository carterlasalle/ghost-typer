<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Typer</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M14 2C7.373 2 2 7.373 2 14s5.373 12 12 12 12-5.373 12-12S20.627 2 14 2z" fill="url(#ghostGrad)" opacity="0.15"/>
          <path d="M14 4c-5.523 0-10 4.477-10 10v6c0 1.1.9 2 2 2h1.5c.828 0 1.5-.672 1.5-1.5s.672-1.5 1.5-1.5 1.5.672 1.5 1.5.672 1.5 1.5 1.5h1c.828 0 1.5-.672 1.5-1.5s.672-1.5 1.5-1.5 1.5.672 1.5 1.5.672 1.5 1.5 1.5H22c1.1 0 2-.9 2-2v-6c0-5.523-4.477-10-10-10z" fill="url(#ghostGrad)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
          <circle cx="10.5" cy="13" r="1.8" fill="#0a0a0f"/>
          <circle cx="17.5" cy="13" r="1.8" fill="#0a0a0f"/>
          <circle cx="10.5" cy="12.6" r="0.7" fill="white" opacity="0.9"/>
          <circle cx="17.5" cy="12.6" r="0.7" fill="white" opacity="0.9"/>
          <defs>
            <linearGradient id="ghostGrad" x1="2" y1="2" x2="26" y2="26">
              <stop offset="0%" stop-color="#60a5fa"/>
              <stop offset="100%" stop-color="#2563eb"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="logo-text">
          <h1>Ghost Typer</h1>
          <span class="version">v1.0</span>
        </div>
      </div>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span class="status-text">Idle</span>
      </div>
    </header>

    <!-- Text Input -->
    <section class="section">
      <label class="section-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Text to Type
      </label>
      <textarea id="textInput" placeholder="Paste your text here..." spellcheck="false"></textarea>
      <div class="char-count"><span id="charCount">0</span> characters · <span id="wordCount">0</span> words</div>
    </section>

    <!-- Speed Configuration -->
    <section class="section">
      <label class="section-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Configuration
      </label>

      <div class="config-grid">
        <!-- Typing Speed -->
        <div class="config-item">
          <div class="config-header">
            <span class="config-name">Typing Speed</span>
            <span class="config-value" id="speedValue">80 WPM</span>
          </div>
          <input type="range" id="speedSlider" min="30" max="200" value="80" class="slider">
          <div class="config-range"><span>30</span><span>200</span></div>
        </div>

        <!-- Speed Variation -->
        <div class="config-item">
          <div class="config-header">
            <span class="config-name">Speed Variation</span>
            <span class="config-value" id="variationValue">25%</span>
          </div>
          <input type="range" id="variationSlider" min="0" max="50" value="25" class="slider">
          <div class="config-range"><span>Robotic</span><span>Erratic</span></div>
        </div>

        <!-- Mistake Rate -->
        <div class="config-item">
          <div class="config-header">
            <span class="config-name">Mistake Rate</span>
            <span class="config-value" id="mistakeValue">3%</span>
          </div>
          <input type="range" id="mistakeSlider" min="0" max="15" value="3" class="slider slider-accent">
          <div class="config-range"><span>Perfect</span><span>Sloppy</span></div>
        </div>

        <!-- Punctuation Delay -->
        <div class="config-item">
          <div class="config-header">
            <span class="config-name">Punctuation Delay</span>
            <span class="config-value" id="punctValue">400ms</span>
          </div>
          <input type="range" id="punctSlider" min="0" max="2000" value="400" step="50" class="slider">
          <div class="config-range"><span>None</span><span>2s</span></div>
        </div>

        <!-- Paragraph Pause -->
        <div class="config-item">
          <div class="config-header">
            <span class="config-name">Paragraph Pause</span>
            <span class="config-value" id="paraValue">3.0s</span>
          </div>
          <input type="range" id="paraSlider" min="500" max="10000" value="3000" step="100" class="slider">
          <div class="config-range"><span>0.5s</span><span>10s</span></div>
        </div>

        <!-- Thinking Pauses -->
        <div class="config-item">
          <div class="config-header">
            <span class="config-name">Thinking Pauses</span>
            <span class="config-value" id="thinkValue">On</span>
          </div>
          <label class="toggle">
            <input type="checkbox" id="thinkToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </section>

    <!-- Progress -->
    <section class="section" id="progressSection" style="display: none;">
      <div class="progress-header">
        <span class="progress-label">Progress</span>
        <span class="progress-percent" id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-stats">
        <span id="progressChars">0 / 0 chars</span>
        <span id="progressEta">~0s remaining</span>
      </div>
    </section>

    <!-- Controls -->
    <section class="controls">
      <button class="btn btn-primary" id="startBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start Typing
      </button>
      <button class="btn btn-secondary" id="pauseBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        Pause
      </button>
      <button class="btn btn-danger" id="stopBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Stop
      </button>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <span>Open Source · MIT License</span>
      <a href="https://github.com/user/ghost-typer" target="_blank" class="footer-link">GitHub ↗</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
