<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ghost Typer</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <span class="header-icon">👻</span>
        <span class="header-title">Ghost Typer</span>
      </div>
      <div class="badge" id="statusBadge" data-status="idle">
        <span class="badge-dot"></span>
        <span class="badge-text" id="statusText">Idle</span>
      </div>
    </div>

    <!-- Error Banner -->
    <div class="error-banner" id="errorBanner" style="display:none">
      <span id="errorText"></span>
      <button class="error-close" id="errorClose">✕</button>
    </div>

    <!-- Text -->
    <div class="card">
      <textarea id="textInput" rows="4" placeholder="Paste the text you want typed…" spellcheck="false"></textarea>
      <div class="meta"><span id="charCount">0</span> chars · <span id="wordCount">0</span> words</div>
    </div>

    <!-- Settings -->
    <div class="card">
      <div class="card-title">Settings</div>

      <div class="field">
        <div class="field-row"><span>Speed</span><span class="val" id="speedVal">80 WPM</span></div>
        <input type="range" id="speed" min="30" max="200" value="80">
      </div>

      <div class="field">
        <div class="field-row"><span>Variation</span><span class="val" id="varVal">25%</span></div>
        <input type="range" id="variation" min="0" max="50" value="25">
      </div>

      <div class="field">
        <div class="field-row"><span>Mistakes</span><span class="val" id="mistakeVal">3%</span></div>
        <input type="range" id="mistakes" min="0" max="15" value="3">
      </div>

      <div class="field">
        <div class="field-row"><span>Punctuation delay</span><span class="val" id="punctVal">400 ms</span></div>
        <input type="range" id="punct" min="0" max="2000" value="400" step="50">
      </div>

      <div class="field">
        <div class="field-row"><span>Paragraph pause</span><span class="val" id="paraVal">3.0 s</span></div>
        <input type="range" id="para" min="500" max="10000" value="3000" step="100">
      </div>

      <div class="field field-toggle">
        <span>Thinking pauses</span>
        <label class="switch">
          <input type="checkbox" id="thinking" checked>
          <span class="track"></span>
        </label>
      </div>
    </div>

    <!-- Progress -->
    <div class="card" id="progressCard" style="display:none">
      <div class="field-row"><span>Progress</span><span class="val" id="pctText">0%</span></div>
      <div class="bar"><div class="bar-fill" id="barFill"></div></div>
      <div class="meta"><span id="pctChars">0 / 0</span><span id="pctEta"></span></div>
    </div>

    <!-- Buttons -->
    <div class="actions">
      <button class="btn primary" id="startBtn">▶ Start</button>
      <button class="btn" id="pauseBtn" disabled>⏸ Pause</button>
      <button class="btn danger" id="stopBtn" disabled>⏹ Stop</button>
    </div>

    <div class="footer">
      <span>v1.1 · MIT</span>
      <a href="https://github.com/Leonxlnx/ghost-typer" target="_blank">GitHub ↗</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
